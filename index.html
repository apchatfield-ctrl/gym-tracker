<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Gym Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #111; font-family: -apple-system, 'Inter', sans-serif; color: #fff; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const SESSIONS = [
  {
    id: "push-a", label: "Push A", emoji: "💪", accent: "#E8572A",
    sections: [{ title: "Main Work", exercises: [
      { name: "Dumbbell Bench Press", sets: 3, reps: "8–10" },
      { name: "Seated DB Shoulder Press", sets: 3, reps: "10" },
      { name: "Cable Chest Fly", sets: 3, reps: "12" },
      { name: "Lateral Raises", sets: 3, reps: "12–15" },
      { name: "Tricep Pushdowns (cable)", sets: 3, reps: "12" },
    ]}],
  },
  {
    id: "pull-a", label: "Pull A", emoji: "🔙", accent: "#2AE87B",
    sections: [{ title: "Main Work", exercises: [
      { name: "Pull-Ups / Assisted Pull-Ups", sets: 3, reps: "max/8" },
      { name: "Seated Cable Row", sets: 3, reps: "10" },
      { name: "Straight Arm Pulldown", sets: 3, reps: "12" },
      { name: "Face Pulls", sets: 3, reps: "15" },
      { name: "Bicep Curls", sets: 3, reps: "12" },
    ]}],
  },
  {
    id: "legs", label: "Legs", emoji: "🦵", accent: "#2A7BE8",
    sections: [{ title: "Main Work", exercises: [
      { name: "Goblet Squat", sets: 3, reps: "10" },
      { name: "Romanian Deadlift", sets: 3, reps: "10" },
      { name: "Hip Thrust", sets: 3, reps: "12" },
      { name: "Bulgarian Split Squat", sets: 3, reps: "8/leg" },
      { name: "Calf Raises", sets: 3, reps: "15" },
    ]}],
  },
  {
    id: "core", label: "Core", emoji: "🎯", accent: "#E84040",
    sections: [{ title: "Core Circuit", exercises: [
      { name: "Plank", sets: 3, reps: "45–60 sec" },
      { name: "Dead Bug", sets: 3, reps: "12/side" },
      { name: "Pallof Press (cable)", sets: 3, reps: "12/side" },
      { name: "Ab Wheel Rollout", sets: 3, reps: "8–10" },
      { name: "Side Plank", sets: 3, reps: "40 sec/side" },
      { name: "Hanging Knee Raise", sets: 3, reps: "12" },
    ]}],
  },
  {
    id: "push-b", label: "Push B", emoji: "🔥", accent: "#E8C22A",
    sections: [{ title: "Main Work", exercises: [
      { name: "Barbell / DB Bench Press", sets: 4, reps: "6–8" },
      { name: "Incline DB Press", sets: 3, reps: "10" },
      { name: "Arnold Press", sets: 3, reps: "10" },
      { name: "Lateral Raises", sets: 3, reps: "15" },
      { name: "Skull Crushers", sets: 3, reps: "10" },
    ]}],
  },
  {
    id: "pull-b", label: "Pull B", emoji: "💚", accent: "#1AAD6A",
    sections: [{ title: "Main Work", exercises: [
      { name: "Barbell / DB Row", sets: 4, reps: "8" },
      { name: "Single-Arm DB Row", sets: 3, reps: "10" },
      { name: "Cable Pullover", sets: 3, reps: "12" },
      { name: "Reverse Fly", sets: 3, reps: "15" },
      { name: "Hammer Curls", sets: 3, reps: "12" },
    ]}],
  },
];

const CYCLE_LENGTH = SESSIONS.length;
const STORAGE_KEY = "gym-tracker-v2";

function todayDateStr() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(str) {
  const d = new Date(str + "T00:00:00");
  return d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { console.error("Save failed", e); }
}

function getSessionProgress(session, data) {
  let total = 0, done = 0;
  session.sections.forEach((sec, si) =>
    sec.exercises.forEach((ex, ei) => {
      for (let i = 0; i < ex.sets; i++) {
        total++;
        if (data?.[si]?.[ei]?.[i]?.done) done++;
      }
    })
  );
  return { total, done };
}

function SetRow({ setIdx, accent, data, onChange, isCore }) {
  const done = data?.done || false;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 0", borderBottom: "1px solid #222", opacity: done ? 0.5 : 1 }}>
      <div style={{ width: 22, textAlign: "center", color: "#555", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{setIdx + 1}</div>
      {!isCore ? (
        <>
          <div style={{ flex: 1 }}>
            <input type="number" placeholder="kg" value={data?.weight || ""} onChange={e => onChange({ ...data, weight: e.target.value })}
              style={{ width: "100%", background: "#222", border: "1px solid #333", borderRadius: 7, color: "#fff", fontSize: 14, padding: "5px 8px", outline: "none", textAlign: "center" }} />
          </div>
          <div style={{ flex: 1 }}>
            <input type="number" placeholder="reps" value={data?.reps || ""} onChange={e => onChange({ ...data, reps: e.target.value })}
              style={{ width: "100%", background: "#222", border: "1px solid #333", borderRadius: 7, color: "#fff", fontSize: 14, padding: "5px 8px", outline: "none", textAlign: "center" }} />
          </div>
        </>
      ) : (
        <div style={{ flex: 1, color: "#555", fontSize: 13, fontStyle: "italic" }}>bodyweight / time</div>
      )}
      <button onClick={() => onChange({ ...data, done: !done })}
        style={{ width: 32, height: 32, borderRadius: "50%", border: done ? "none" : "2px solid #444", background: done ? accent : "transparent", color: done ? "#111" : "#555", cursor: "pointer", fontSize: 15, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
        ✓
      </button>
    </div>
  );
}

function ExerciseCard({ exercise, accent, sectionIdx, exIdx, sessionData, onUpdate, isCore, onViewHistory }) {
  const [expanded, setExpanded] = useState(false);
  const sets = Array.from({ length: exercise.sets });
  const doneCount = sets.filter((_, i) => sessionData?.[sectionIdx]?.[exIdx]?.[i]?.done).length;
  const allDone = doneCount === exercise.sets;

  function completeAll() {
    // Find the first set that has weight/reps filled in to use as template
    const template = sets.reduce((found, _, i) => {
      if (found) return found;
      const d = sessionData?.[sectionIdx]?.[exIdx]?.[i];
      if (d?.weight || d?.reps) return d;
      return null;
    }, null);

    sets.forEach((_, i) => {
      const existing = sessionData?.[sectionIdx]?.[exIdx]?.[i] || {};
      const weight = existing.weight || template?.weight || "";
      const reps = existing.reps || template?.reps || "";
      onUpdate(sectionIdx, exIdx, i, { ...existing, weight, reps, done: true });
    });
    setExpanded(true);
  }

  return (
    <div style={{ background: allDone ? "#0f1f0f" : "#1a1a1a", border: `1px solid ${allDone ? accent + "66" : expanded ? "#333" : "#222"}`, borderRadius: 13, marginBottom: 10, overflow: "hidden" }}>
      <button onClick={() => setExpanded(!expanded)}
        style={{ width: "100%", background: "transparent", border: "none", padding: "12px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", textAlign: "left" }}>
        <div style={{ flex: 1 }}>
          <div style={{ color: allDone ? accent : "#e0e0e0", fontWeight: 600, fontSize: 15 }}>{exercise.name}</div>
          <div style={{ color: "#666", fontSize: 12, marginTop: 2 }}>{exercise.sets} sets × {exercise.reps}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: accent, background: accent + "22", borderRadius: 8, padding: "3px 8px" }}>{doneCount}/{exercise.sets}</div>
          <div style={{ color: "#555", fontSize: 14 }}>{expanded ? "▲" : "▼"}</div>
        </div>
      </button>

      {/* Complete all sets button — always visible */}
      {!allDone && (
        <div style={{ padding: "0 14px 10px" }}>
          <button onClick={completeAll}
            style={{ width: "100%", background: accent + "22", border: `1px solid ${accent}44`, borderRadius: 8, padding: "7px", color: accent, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            ✓ Complete all {exercise.sets} sets
          </button>
        </div>
      )}

      {expanded && (
        <div style={{ padding: "0 14px 12px" }}>
          {!isCore && (
            <div style={{ display: "flex", gap: 8, marginBottom: 4 }}>
              <div style={{ width: 22 }} />
              <div style={{ flex: 1, textAlign: "center", fontSize: 11, color: "#555", fontWeight: 600, letterSpacing: 1 }}>KG</div>
              <div style={{ flex: 1, textAlign: "center", fontSize: 11, color: "#555", fontWeight: 600, letterSpacing: 1 }}>REPS</div>
              <div style={{ width: 32 }} />
            </div>
          )}
          {sets.map((_, i) => (
            <SetRow key={i} setIdx={i} accent={accent} isCore={isCore}
              data={sessionData?.[sectionIdx]?.[exIdx]?.[i] || {}}
              onChange={(newData) => onUpdate(sectionIdx, exIdx, i, newData)} />
          ))}
          <button onClick={onViewHistory}
            style={{ background: "none", border: "none", color: "#444", fontSize: 11, cursor: "pointer", marginTop: 6 }}>
            📊 View history
          </button>
        </div>
      )}
    </div>
  );
}

function HistoryModal({ exerciseName, completedSessions, accent, onClose }) {
  const entries = completedSessions.filter(s => {
    for (const si in s.data) {
      for (const ei in s.data[si]) {
        if (s.data[si][ei]._name === exerciseName) return true;
      }
    }
    return false;
  }).slice(-10).reverse();

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 100, display: "flex", alignItems: "flex-end" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#1a1a1a", borderRadius: "20px 20px 0 0", width: "100%", padding: 20, maxHeight: "70vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 16 }}>{exerciseName}</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#888", fontSize: 20, cursor: "pointer" }}>✕</button>
        </div>
        {entries.length === 0 && <div style={{ color: "#555", fontSize: 14 }}>No history yet.</div>}
        {entries.map((s, idx) => {
          let sets = [];
          for (const si in s.data) {
            for (const ei in s.data[si]) {
              if (s.data[si][ei]._name === exerciseName) {
                const exData = s.data[si][ei];
                for (const setIdx in exData) {
                  if (setIdx === "_name") continue;
                  if (exData[setIdx]?.done) sets.push(exData[setIdx]);
                }
              }
            }
          }
          if (!sets.length) return null;
          return (
            <div key={idx} style={{ marginBottom: 14, borderBottom: "1px solid #2a2a2a", paddingBottom: 14 }}>
              <div style={{ fontSize: 12, color: accent, fontWeight: 700, marginBottom: 6 }}>
                Session {s.sessionNumber} · {formatDate(s.date)}
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {sets.map((set, i) => (
                  <div key={i} style={{ background: "#222", borderRadius: 8, padding: "4px 10px", fontSize: 13, color: "#ccc" }}>
                    {set.weight ? `${set.weight}kg` : "—"} × {set.reps || "—"}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [currentSessionIdx, setCurrentSessionIdx] = useState(0);
  const [sessionNumber, setSessionNumber] = useState(1);
  const [activeData, setActiveData] = useState({});
  const [completedSessions, setCompletedSessions] = useState([]);
  const [view, setView] = useState("session");
  const [historyModal, setHistoryModal] = useState(null);
  const [confirmComplete, setConfirmComplete] = useState(false);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const saved = loadState();
    if (saved) {
      setCurrentSessionIdx(saved.currentSessionIdx ?? 0);
      setSessionNumber(saved.sessionNumber ?? 1);
      setActiveData(saved.activeData ?? {});
      setCompletedSessions(saved.completedSessions ?? []);
    }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    saveState({ currentSessionIdx, sessionNumber, activeData, completedSessions });
  }, [currentSessionIdx, sessionNumber, activeData, completedSessions, loaded]);

  const session = SESSIONS[currentSessionIdx % CYCLE_LENGTH];
  const nextSession = SESSIONS[(currentSessionIdx + 1) % CYCLE_LENGTH];

  const handleUpdate = useCallback((sectionIdx, exIdx, setIdx, newData) => {
    setActiveData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next[sectionIdx]) next[sectionIdx] = {};
      if (!next[sectionIdx][exIdx]) next[sectionIdx][exIdx] = {};
      next[sectionIdx][exIdx]._name = SESSIONS[currentSessionIdx % CYCLE_LENGTH].sections[sectionIdx].exercises[exIdx].name;
      next[sectionIdx][exIdx][setIdx] = newData;
      return next;
    });
  }, [currentSessionIdx]);

  function handleCompleteSession() {
    const completed = {
      sessionNumber, sessionIdx: currentSessionIdx % CYCLE_LENGTH,
      label: session.label, emoji: session.emoji, accent: session.accent,
      date: todayDateStr(), data: activeData,
    };
    setCompletedSessions(prev => [...prev, completed]);
    setCurrentSessionIdx(prev => prev + 1);
    setSessionNumber(prev => prev + 1);
    setActiveData({});
    setConfirmComplete(false);
  }

  const { total, done } = getSessionProgress(session, activeData);
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  if (!loaded) return <div style={{ background: "#111", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#555" }}>Loading...</div>;

  return (
    <div style={{ background: "#111", minHeight: "100vh", color: "#fff", maxWidth: 430, margin: "0 auto" }}>

      {historyModal && <HistoryModal exerciseName={historyModal} completedSessions={completedSessions} accent={session.accent} onClose={() => setHistoryModal(null)} />}

      {confirmComplete && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#1e1e1e", borderRadius: 20, padding: 24, width: "100%", maxWidth: 360, border: "1px solid #333" }}>
            <div style={{ fontSize: 32, textAlign: "center", marginBottom: 12 }}>🎉</div>
            <div style={{ fontWeight: 800, fontSize: 18, textAlign: "center", marginBottom: 8 }}>Session Complete!</div>
            <div style={{ color: "#888", fontSize: 14, textAlign: "center", marginBottom: 20 }}>
              This will save Session {sessionNumber} and move you on to <span style={{ color: nextSession.accent, fontWeight: 700 }}>{nextSession.label}</span> next.
            </div>
            <button onClick={handleCompleteSession}
              style={{ width: "100%", background: session.accent, border: "none", borderRadius: 12, padding: "14px", color: "#111", fontWeight: 800, fontSize: 16, cursor: "pointer", marginBottom: 10 }}>
              Save & Move On
            </button>
            <button onClick={() => setConfirmComplete(false)}
              style={{ width: "100%", background: "transparent", border: "1px solid #333", borderRadius: 12, padding: "12px", color: "#888", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
              Go Back
            </button>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{ background: "#161616", padding: "18px 16px 0", borderBottom: "1px solid #222", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
          <div>
            <div style={{ fontSize: 11, color: "#555", letterSpacing: 2, textTransform: "uppercase" }}>Session {sessionNumber} · {formatDate(todayDateStr())}</div>
            <div style={{ fontSize: 20, fontWeight: 800, marginTop: 2 }}>{session.emoji} {session.label}</div>
          </div>
          <button onClick={() => setActiveData({})}
            style={{ background: "#222", border: "none", color: "#777", borderRadius: 8, padding: "6px 12px", fontSize: 12, cursor: "pointer" }}>
            Reset
          </button>
        </div>
        <div style={{ fontSize: 11, color: "#444", marginBottom: 10 }}>Next up: {nextSession.emoji} {nextSession.label}</div>
        <div style={{ marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#555", marginBottom: 5 }}>
            <span>{done} of {total} sets done</span>
            <span style={{ color: session.accent, fontWeight: 700 }}>{pct}%</span>
          </div>
          <div style={{ background: "#2a2a2a", borderRadius: 4, height: 4 }}>
            <div style={{ width: `${pct}%`, height: "100%", background: session.accent, borderRadius: 4, transition: "width 0.3s" }} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 4, marginBottom: 12 }}>
          {SESSIONS.map((s, i) => (
            <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i === currentSessionIdx % CYCLE_LENGTH ? s.accent : "#2a2a2a" }} />
          ))}
        </div>
        <div style={{ display: "flex", gap: 6, paddingBottom: 12 }}>
          {[["session", "Session"], ["upnext", "Up Next"], ["history", "History"]].map(([v, label]) => (
            <button key={v} onClick={() => setView(v)}
              style={{ background: view === v ? "#2a2a2a" : "transparent", border: "none", color: view === v ? "#fff" : "#555", borderRadius: 6, padding: "4px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ padding: "16px 16px 80px" }}>
        {view === "session" && (
          <>
            {session.sections.map((section, si) => {
              const isCore = session.id === "core";
              return (
                <div key={si} style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: session.accent, textTransform: "uppercase", marginBottom: 10 }}>{section.title}</div>
                  {section.exercises.map((ex, ei) => (
                    <ExerciseCard key={ei} exercise={ex} accent={session.accent}
                      sectionIdx={si} exIdx={ei} sessionData={activeData}
                      onUpdate={handleUpdate} isCore={isCore}
                      onViewHistory={() => setHistoryModal(ex.name)} />
                  ))}
                </div>
              );
            })}
            <button onClick={() => setConfirmComplete(true)}
              style={{ width: "100%", background: pct === 100 ? session.accent : "#1e1e1e", border: `1px solid ${pct === 100 ? session.accent : "#333"}`, borderRadius: 14, padding: "16px", color: pct === 100 ? "#111" : "#555", fontWeight: 800, fontSize: 16, cursor: "pointer", marginTop: 8 }}>
              {pct === 100 ? "✓ Complete Session" : `Complete Session (${pct}% done)`}
            </button>
            <div style={{ fontSize: 11, color: "#444", textAlign: "center", marginTop: 8 }}>You can complete even if not all sets are done</div>
          </>
        )}

        {view === "upnext" && (
          <div>
            <div style={{ fontSize: 13, color: "#555", marginBottom: 16 }}>Your 6-session cycle — repeats endlessly</div>
            {SESSIONS.map((s, i) => {
              const cyclePos = currentSessionIdx % CYCLE_LENGTH;
              const isCurrent = i === cyclePos;
              const stepsAhead = (i - cyclePos + CYCLE_LENGTH) % CYCLE_LENGTH;
              const upcomingSessionNum = sessionNumber + stepsAhead;
              return (
                <div key={i} style={{ background: isCurrent ? "#1a1a1a" : "#141414", border: `1px solid ${isCurrent ? s.accent : "#222"}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ fontSize: 22 }}>{s.emoji}</div>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 15, color: isCurrent ? s.accent : "#e0e0e0" }}>
                          {s.label}
                          {isCurrent && <span style={{ fontSize: 11, fontWeight: 600, background: s.accent, color: "#111", borderRadius: 6, padding: "2px 7px", marginLeft: 8 }}>NOW</span>}
                        </div>
                        <div style={{ fontSize: 12, color: "#555", marginTop: 2 }}>
                          Session {upcomingSessionNum} · {isCurrent ? "Today" : `In ${stepsAhead} session${stepsAhead > 1 ? "s" : ""}`}
                        </div>
                      </div>
                    </div>
                    <div style={{ fontSize: 11, color: "#444" }}>{s.sections[0].exercises.length} exercises</div>
                  </div>
                  <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 5 }}>
                    {s.sections[0].exercises.map((ex, ei) => (
                      <div key={ei} style={{ fontSize: 11, color: isCurrent ? s.accent + "cc" : "#444", background: isCurrent ? s.accent + "11" : "#1e1e1e", borderRadius: 6, padding: "3px 8px" }}>
                        {ex.name}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {view === "history" && (
          <div>
            <div style={{ fontSize: 13, color: "#555", marginBottom: 16 }}>{completedSessions.length} session{completedSessions.length !== 1 ? "s" : ""} logged</div>
            {completedSessions.length === 0 && <div style={{ color: "#444", fontSize: 14, textAlign: "center", marginTop: 40 }}>No sessions completed yet!</div>}
            {[...completedSessions].reverse().map((s, idx) => {
              const sessionDef = SESSIONS[s.sessionIdx];
              const { total: t, done: d } = getSessionProgress(sessionDef, s.data);
              return (
                <div key={idx} style={{ background: "#1a1a1a", border: "1px solid #222", borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 15 }}>{s.emoji} Session {s.sessionNumber} · {s.label}</div>
                      <div style={{ fontSize: 12, color: "#555", marginTop: 3 }}>{formatDate(s.date)}</div>
                    </div>
                    <div style={{ color: s.accent, fontWeight: 700, fontSize: 13 }}>{d}/{t} sets</div>
                  </div>
                  <div style={{ background: "#222", borderRadius: 3, height: 3, marginTop: 10 }}>
                    <div style={{ width: `${t > 0 ? Math.round((d / t) * 100) : 0}%`, height: "100%", background: s.accent, borderRadius: 3 }} />
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
